<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="keepsake for hady for his time at J-PAL"
    />
    <title>hady's memory keepsake</title>
    <meta property="og:title" content="hady's memory keepsake" />
    <meta
      property="og:description"
      content="keepsake for hady for his time at J-PAL"
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="hady's memory keepsake" />
    <meta
      name="twitter:description"
      content="keepsake for hady for his time at J-PAL"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="site-header">
        <h1>hady's memory keepsake</h1>
      </header>

      <section class="gallery-section" aria-label="Keepsake gallery">
        <div id="gallery" class="gallery" aria-live="polite"></div>
        <p id="emptyState" class="empty-state" hidden>
          Add image entries to <code>data/images.json</code> to begin.
        </p>
      </section>
    </main>

    <dialog id="keepsakeDialog" class="dialog">
      <button class="dialog-close" type="button" aria-label="Close message">
        &times;
      </button>
      <button
        class="dialog-nav dialog-nav-prev"
        type="button"
        aria-label="Previous image"
      >
        ‹
      </button>
      <button
        class="dialog-nav dialog-nav-next"
        type="button"
        aria-label="Next image"
      >
        ›
      </button>
      <div class="dialog-media-wrap">
        <img id="dialogImage" class="dialog-image" alt="" />
      </div>
      <div id="dialogText" class="dialog-text"></div>
    </dialog>

    <script src="app.js" type="module"></script>
  </body>
</html>
